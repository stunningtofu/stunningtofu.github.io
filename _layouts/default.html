<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Jekyll SEO Tag akan otomatis mengisi title, description, og:image, dll -->
    <title>{{ page.title | default: site.title }}</title>
    {% seo %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <!-- Iconify -->
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            content: ["./**/*.html", "./**/*.md"],   // Untuk purge (meski pakai CDN tetap bagus)
            theme: {
                extend: {
                    colors: {
                        'light-gray': '#F8F9FA',
                        'dark-slate': '#343A40',
                        'muted-gray': '#6C757D',
                        'deep-blue': '#0056B3',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['"Fira Code"', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- Optional: Favicon (bisa ditambahkan nanti) -->
    <!-- <link rel="icon" href="/favicon.ico" type="image/x-icon"> -->
</head>

<body id="top" class="font-sans antialiased selection:bg-deep-blue selection:text-white">

    {{ content }}

    <!-- Script global (bisa dipindah ke assets/js nanti kalau mau lebih bersih) -->
    <script>
        // Smooth scroll + Mobile nav toggle
        (function () {
            const duration = 950;
            const ease = t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

            function scrollToY(targetY) {
                const startY = window.scrollY;
                const diff = targetY - startY;
                let startTime;

                function step(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const elapsed = timestamp - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    window.scrollTo(0, startY + diff * ease(progress));
                    if (elapsed < duration) requestAnimationFrame(step);
                }

                requestAnimationFrame(step);
            }

            // Mobile nav toggle
            const navToggle = document.getElementById('nav-toggle');
            const navMenu = document.getElementById('nav-menu');

            if (navToggle && navMenu) {
                navToggle.addEventListener('click', () => {
                    const expanded = navToggle.getAttribute('aria-expanded') === 'true';
                    navToggle.setAttribute('aria-expanded', String(!expanded));
                    navMenu.classList.toggle('hidden');
                });
            }

            // Smooth scroll untuk semua link # 
            document.querySelectorAll('a[href^="#"]').forEach(link => {
                link.addEventListener('click', event => {
                    const href = link.getAttribute('href');
                    if (!href || href === '#') return;

                    const target = document.querySelector(href);
                    if (!target) return;

                    event.preventDefault();
                    const navHeight = document.querySelector('nav')?.offsetHeight || 0;
                    const targetY = target.getBoundingClientRect().top + window.scrollY - navHeight;
                    scrollToY(targetY);

                    // Tutup menu mobile setelah klik
                    if (navMenu && !navMenu.classList.contains('hidden')) {
                        navMenu.classList.add('hidden');
                        navToggle?.setAttribute('aria-expanded', 'false');
                    }
                });
            });
        })();
    </script>
</body>
</html>
