<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ page.title | default: site.title }}</title>
    {% seo %}   <!-- jekyll-seo-tag otomatis pakai meta dari index.md + _config.yml -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <!-- Iconify + Tailwind CDN (persis seperti sebelumnya) -->
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'light-gray': '#F8F9FA',
                        'dark-slate': '#343A40',
                        'muted-gray': '#6C757D',
                        'deep-blue': '#0056B3',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['"Fira Code"', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>

<body id="top" class="font-sans antialiased selection:bg-deep-blue selection:text-white">

    {{ content }}   <!-- ← semua konten dari index.md akan masuk di sini -->

</body>
</html>
